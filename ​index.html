<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة سمان ههيا</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; margin: 0; padding: 15px; background-color: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; margin-top: 0; font-size: 18px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px;}
        button { color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-green { background: #27ae60; }
        .btn-blue { background: #2980b9; }
        .btn-red { background: #c0392b; }
        .btn-purple { background: #8e44ad; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #ecf0f1; padding: 15px; text-align: center; border-radius: 8px; }
        .stat-num { display: block; font-size: 22px; font-weight: bold; color: #d35400; margin-top: 5px;}
    </style>
</head>
<body>

    <div class="card">
        <h2>📊 لوحة التحكم والمخزن</h2>
        <div class="grid">
            <div class="stat-box">الماكينة (بيضة)<span class="stat-num" id="totalEggs">0</span></div>
            <div class="stat-box">الفريزر (جوز)<span class="stat-num" id="freezerCount">0</span></div>
            <div class="stat-box" style="grid-column: span 2;">إجمالي مبيعات اليوم (جنيه)<span class="stat-num" id="totalSales" style="color: #27ae60;">0</span></div>
        </div>
    </div>

    <div class="card">
        <h2>🥚 مكنة التفريخ (إدخال بيض)</h2>
        <input type="number" id="eggCount" placeholder="عدد البيض (مثال: 500)">
        <button id="addEggsBtn" class="btn-green">تسجيل وحساب تاريخ الفقس</button>
        <p id="hatchDateMsg" style="color: #27ae60; font-weight: bold; margin-top: 15px; text-align: center;"></p>
    </div>

    <div class="card">
        <h2>❄️ الفريزر (تخزين السمان)</h2>
        <input type="number" id="freezerQty" placeholder="الكمية المضافة (بالجوز)">
        <button id="addFreezerBtn" class="btn-blue">➕ إضافة للفريزر</button>
    </div>

    <div class="card">
        <h2>💰 المبيعات (بيع من الفريزر)</h2>
        <div class="grid">
            <input type="number" id="saleQty" placeholder="الكمية (جوز)">
            <input type="number" id="salePrice" placeholder="سعر الجوز (جنيه)">
        </div>
        <button id="sellBtn" class="btn-purple">تسجيل البيع وخصم من الفريزر</button>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        // تفعيل ملف المشغل لتحويل الموقع لتطبيق
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
