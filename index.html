<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سمان ههيا | حاسبة استهلاك العلف</title>
    <!-- استدعاء Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#166534', // الأخضر المميز لسمان ههيا
                        brandLight: '#15803d'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <!-- Header -->
    <header class="bg-brand text-white shadow-lg py-6 px-4 text-center">
        <h1 class="text-3xl font-extrabold mb-2">سمان ههيا</h1>
        <p class="text-green-100">نظام إدارة ومراقبة استهلاك العلف (المعايير العالمية)</p>
    </header>

    <main class="max-w-3xl mx-auto mt-8 px-4 space-y-8">

        <!-- حاسبة الاستهلاك اليومي -->
        <section class="bg-white rounded-2xl shadow-md p-6 border-t-4 border-brand">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="bg-brand text-white w-8 h-8 rounded-full flex items-center justify-center ml-3 text-sm">1</span>
                المتابعة اليومية للقطيع
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">عمر السمان (بالأيام)</label>
                    <input type="number" id="ageDays" min="1" max="45" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-brand" placeholder="مثال: 15">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">العدد الحالي للطيور</label>
                    <input type="number" id="birdCount" min="1" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-brand" placeholder="مثال: 1000">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">العلف المستهلك اليوم (كجم)</label>
                    <input type="number" id="actualFeed" step="0.1" min="0" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-brand" placeholder="مثال: 15.5">
                </div>
            </div>

            <button onclick="calculateDaily()" class="w-full bg-brand hover:bg-brandLight text-white font-bold py-3 rounded-lg transition duration-300 shadow-md">
                احسب الاستهلاك اليومي
            </button>

            <!-- نتيجة اليومي -->
            <div id="dailyResult" class="hidden mt-6 p-5 rounded-xl border">
                <!-- سيتم حقن النتيجة هنا عبر الجافاسكربت -->
            </div>
        </section>

        <!-- حاسبة معامل التحويل عند الذبح -->
        <section class="bg-white rounded-2xl shadow-md p-6 border-t-4 border-blue-600">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="bg-blue-600 text-white w-8 h-8 rounded-full flex items-center justify-center ml-3 text-sm">2</span>
                تقييم الدورة (عند الذبح)
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">إجمالي العلف المستهلك طوال الدورة (كجم)</label>
                    <input type="number" id="totalFeedCycle" step="0.1" min="0" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="مثال: 550">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">إجمالي وزن اللحم الناتج للقطيع (كجم)</label>
                    <input type="number" id="totalMeatWeight" step="0.1" min="0" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="مثال: 220">
                </div>
            </div>

            <button onclick="calculateFCR()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300 shadow-md">
                احسب معامل التحويل الغذائي (FCR)
            </button>

            <!-- نتيجة التحويل -->
            <div id="fcrResult" class="hidden mt-6 p-5 rounded-xl border">
                <!-- سيتم حقن النتيجة هنا -->
            </div>
        </section>

    </main>

    <script>
        // دالة لمعرفة الاستهلاك القياسي للطائر بالجرام حسب العمر (تقريبي بناءً على الجداول العالمية)
        function getStandardGramsPerBird(age) {
            if(age >= 1 && age <= 7) return 4.5;
            if(age >= 8 && age <= 14) return 10.0;
            if(age >= 15 && age <= 21) return 15.0;
            if(age >= 22 && age <= 28) return 19.0;
            if(age >= 29 && age <= 35) return 23.5;
            if(age >= 36 && age <= 45) return 28.0;
            return 0; // خارج النطاق
        }

        function calculateDaily() {
            const age = parseInt(document.getElementById('ageDays').value);
            const count = parseInt(document.getElementById('birdCount').value);
            const actualKg = parseFloat(document.getElementById('actualFeed').value);
            const resultBox = document.getElementById('dailyResult');

            if(!age || !count || !actualKg) {
                alert("برجاء إدخال جميع البيانات (العمر، العدد، العلف).");
                return;
            }

            const standardGrams = getStandardGramsPerBird(age);
            if(standardGrams === 0) {
                alert("العمر المدخل غير صحيح لدورة تسمين السمان.");
                return;
            }

            // الحسبة: (جرامات الطائر × عدد الطيور) ÷ 1000 = كيلوجرام
            const expectedKg = (standardGrams * count) / 1000;
            
            // حساب نسبة الاختلاف
            const diffKg = actualKg - expectedKg;
            const diffPercentage = (diffKg / expectedKg) * 100;

            let statusColor, statusText, adviceText;

            if (diffPercentage > 15) {
                statusColor = "bg-red-50 border-red-400 text-red-800";
                statusText = "استهلاك زائد جداً (هدر) ⚠️";
                adviceText = "الطائر يأكل أكثر من اللازم! راجع المعالف قد يكون هناك هدر في الفرشة، أو أن درجة الحرارة منخفضة جداً فالطائر يحرق العلف للتدفئة.";
            } else if (diffPercentage < -10) {
                statusColor = "bg-yellow-50 border-yellow-400 text-yellow-800";
                statusText = "استهلاك ضعيف (فقدان شهية) 📉";
                adviceText = "الطائر لا يأكل كفايته! راجع جودة العلف، تأكد من نظافة المياه وتوافرها، وافحص القطيع لأي أعراض مرضية، أو تأكد أن الحرارة ليست مرتفعة جداً.";
            } else {
                statusColor = "bg-green-50 border-brand text-brand";
                statusText = "معدل استهلاك ممتاز ومطابق للمعايير ✅";
                adviceText = "عمل رائع! القطيع يستهلك العلف بالمعدل القياسي، استمر على نفس نظام التهوية والحرارة.";
            }

            resultBox.className = `mt-6 p-5 rounded-xl border-2 ${statusColor} block animate-fade-in`;
            resultBox.innerHTML = `
                <h3 class="font-bold text-lg mb-3">${statusText}</h3>
                <div class="grid grid-cols-2 gap-4 text-sm mb-4">
                    <div class="bg-white p-3 rounded shadow-sm border border-opacity-20">
                        <span class="block text-gray-500 mb-1">الاستهلاك القياسي المفترض:</span>
                        <strong class="text-xl">${expectedKg.toFixed(2)} كجم</strong>
                    </div>
                    <div class="bg-white p-3 rounded shadow-sm border border-opacity-20">
                        <span class="block text-gray-500 mb-1">الاستهلاك الفعلي المُدخل:</span>
                        <strong class="text-xl">${actualKg.toFixed(2)} كجم</strong>
                    </div>
                </div>
                <p class="text-sm font-medium leading-relaxed">💡 <strong>نصيحة:</strong> ${adviceText}</p>
            `;
        }

        function calculateFCR() {
            const feed = parseFloat(document.getElementById('totalFeedCycle').value);
            const meat = parseFloat(document.getElementById('totalMeatWeight').value);
            const resultBox = document.getElementById('fcrResult');

            if(!feed || !meat) {
                alert("برجاء إدخال إجمالي العلف وإجمالي اللحم.");
                return;
            }

            // FCR = العلف / اللحم
            const fcr = feed / meat;
            
            let statusColor, statusText;

            // معايير FCR للسمان التجاري (مثالي: 2.2 إلى 2.6)
            if (fcr <= 2.5) {
                statusColor = "bg-green-50 border-green-500 text-green-800";
                statusText = "ممتاز جداً ✅ (ربحية عالية واستهلاك مثالي)";
            } else if (fcr <= 2.8) {
                statusColor = "bg-blue-50 border-blue-500 text-blue-800";
                statusText = "جيد (ضمن المعدل الطبيعي المقبول)";
            } else {
                statusColor = "bg-red-50 border-red-500 text-red-800";
                statusText = "ضعيف ⚠️ (الطيور استهلكت علف كثير مقابل لحم قليل، الدورة القادمة تحتاج مراجعة للتهوية والحرارة والهدر)";
            }

            resultBox.className = `mt-6 p-5 rounded-xl border-2 ${statusColor} block`;
            resultBox.innerHTML = `
                <h3 class="font-bold text-lg mb-2">معامل التحويل الغذائي (FCR): <span class="text-2xl ml-2">${fcr.toFixed(2)}</span></h3>
                <p class="text-sm font-medium mt-2"><strong>التقييم:</strong> ${statusText}</p>
                <p class="text-xs mt-3 opacity-80">* الرقم يعني أنه لإنتاج 1 كيلو لحم سمان، احتجت إلى ${fcr.toFixed(2)} كيلو علف.</p>
            `;
        }
    </script>
</body>
</html>
