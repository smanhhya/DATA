<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة سمان ههيا</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; margin: 0; padding: 15px; background-color: #f4f7f6; padding-top: 20px;}
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; margin-top: 0; font-size: 18px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px;}
        button { color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 5px; transition: 0.2s;}
        button:active { transform: scale(0.98); }
        .btn-green { background: #27ae60; }
        .btn-blue { background: #2980b9; }
        .btn-purple { background: #8e44ad; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: #ecf0f1; padding: 15px; text-align: center; border-radius: 8px; }
        .stat-num { display: block; font-size: 24px; font-weight: bold; color: #d35400; margin-top: 5px;}
        
        #notificationBox {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            z-index: 1000;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            width: 80%;
            max-width: 350px;
        }
        
        #connectionStatus {
            text-align: center;
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div id="notificationBox"></div>
    <div id="connectionStatus">جاري الاتصال بقاعدة البيانات... ⏳</div>

    <div class="card">
        <h2>📊 لوحة التحكم والمخزن</h2>
        <div class="grid">
            <div class="stat-box">الماكينة (بيضة)<span class="stat-num" id="totalEggs">0</span></div>
            <div class="stat-box">الفريزر (جوز)<span class="stat-num" id="freezerCount">0</span></div>
            <div class="stat-box" style="grid-column: span 2;">إجمالي مبيعات اليوم (جنيه)<span class="stat-num" id="totalSales" style="color: #27ae60;">0</span></div>
        </div>
    </div>

    <div class="card">
        <h2>🥚 مكنة التفريخ (إدخال بيض)</h2>
        <input type="number" id="eggCount" placeholder="عدد البيض (مثال: 500)">
        <button id="addEggsBtn" class="btn-green">تسجيل وحساب تاريخ الفقس</button>
        <p id="hatchDateMsg" style="color: #27ae60; font-weight: bold; margin-top: 15px; text-align: center;"></p>
    </div>

    <div class="card">
        <h2>❄️ الفريزر (تخزين السمان)</h2>
        <input type="number" id="freezerQty" placeholder="الكمية المضافة (بالجوز)">
        <button id="addFreezerBtn" class="btn-blue">➕ إضافة للفريزر</button>
    </div>

    <div class="card">
        <h2>💰 المبيعات (بيع من الفريزر)</h2>
        <div class="grid">
            <input type="number" id="saleQty" placeholder="الكمية (جوز)">
            <input type="number" id="salePrice" placeholder="سعر الجوز (جنيه)">
        </div>
        <button id="sellBtn" class="btn-purple">تسجيل البيع وخصم من الفريزر</button>
    </div>

    <script type="module">
        // استدعاء مكتبات Realtime Database بدلاً من Firestore
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, push, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        function showMessage(text, isError = false) {
            const msgBox = document.getElementById('notificationBox');
            msgBox.innerText = text;
            msgBox.style.backgroundColor = isError ? '#e74c3c' : '#2ecc71';
            msgBox.style.display = 'block';
            setTimeout(() => { msgBox.style.display = 'none'; }, 3000);
        }

        // المفاتيح مع إضافة رابط الـ Realtime Database
        const firebaseConfig = {
          apiKey: "AIzaSyCVlbWLaLqYnQVsWgFPTe4PL38bWLTLyuU",
          authDomain: "sman-6512c.firebaseapp.com",
          databaseURL: "https://sman-6512c-default-rtdb.firebaseio.com",
          projectId: "sman-6512c",
          storageBucket: "sman-6512c.firebasestorage.app",
          messagingSenderId: "64902261641",
          appId: "1:64902261641:web:d9d2d78d966e8aa4618f58"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);

            const totalEggsEl = document.getElementById('totalEggs');
            const freezerCountEl = document.getElementById('freezerCount');
            const totalSalesEl = document.getElementById('totalSales');
            const hatchDateMsg = document.getElementById('hatchDateMsg');
            const statusEl = document.getElementById('connectionStatus');

            statusEl.innerText = "متصل بقاعدة البيانات ✅";
            statusEl.style.color = "#27ae60";

            // 1. الماكينة
            document.getElementById('addEggsBtn').addEventListener('click', async () => {
                const qty = parseInt(document.getElementById('eggCount').value);
                if (!qty) return showMessage("برجاء إدخال عدد البيض", true);

                const today = new Date();
                const hatchDate = new Date();
                hatchDate.setDate(today.getDate() + 17);

                try {
                    const batchRef = push(ref(db, 'incubator_batches'));
                    await set(batchRef, {
                        quantity: qty,
                        insertDate: today.toISOString(),
                        hatchDate: hatchDate.toISOString(),
                        status: 'active'
                    });
                    hatchDateMsg.innerText = `✅ ميعاد الفقس: ${hatchDate.toLocaleDateString('ar-EG')}`;
                    document.getElementById('eggCount').value = '';
                    showMessage("تم تسجيل الدفعة بنجاح!");
                } catch (e) { showMessage("خطأ: تأكد من تعديل الـ Rules لـ true", true); console.error(e);}
            });

            // 2. الفريزر
            async function updateFreezer(amount) {
                const freezerRef = ref(db, "inventory/freezer");
                const snap = await get(freezerRef);
                let currentCount = snap.exists() ? snap.val().count : 0;
                
                const newCount = currentCount + amount;
                if (newCount < 0) {
                    showMessage("الرصيد في الفريزر لا يكفي!", true);
                    return false;
                }
                await set(freezerRef, { count: newCount });
                return true;
            }

            document.getElementById('addFreezerBtn').addEventListener('click', async () => {
                const qty = parseInt(document.getElementById('freezerQty').value);
                if(qty) {
                    try {
                        await updateFreezer(qty);
                        document.getElementById('freezerQty').value = '';
                        showMessage("تم إضافة الكمية للفريزر بنجاح!");
                    } catch(e) { showMessage("خطأ في الاتصال", true); }
                } else { showMessage("برجاء إدخال الكمية أولاً", true); }
            });

            // 3. المبيعات
            document.getElementById('sellBtn').addEventListener('click', async () => {
                const qty = parseInt(document.getElementById('saleQty').value);
                const price = parseFloat(document.getElementById('salePrice').value);
                
                if (!qty || !price) return showMessage("برجاء إدخال الكمية والسعر", true);

                try {
                    const success = await updateFreezer(-qty);
                    if (success) {
                        const today = new Date().toISOString().split('T')[0];
                        const salesRef = push(ref(db, "sales"));
                        await set(salesRef, { quantity: qty, price: price, total: qty * price, date: today });
                        document.getElementById('saleQty').value = '';
                        document.getElementById('salePrice').value = '';
                        showMessage("تم البيع وخصم الكمية من الفريزر");
                    }
                } catch (e) { showMessage("حدث خطأ أثناء البيع", true); }
            });

            // 4. تحديث الأرقام لحظياً
            onValue(ref(db, "inventory/freezer"), (snapshot) => {
                freezerCountEl.innerText = snapshot.exists() ? snapshot.val().count : 0;
            }, (error) => {
                statusEl.innerText = "❌ خطأ في صلاحيات قاعدة البيانات (عدّل الـ Rules)";
                statusEl.style.color = "red";
            });

            onValue(ref(db, "incubator_batches"), (snapshot) => {
                let total = 0;
                snapshot.forEach((child) => { 
                    if(child.val().status === 'active') total += child.val().quantity; 
                });
                totalEggsEl.innerText = total;
            });

            const todayStr = new Date().toISOString().split('T')[0];
            const salesQuery = query(ref(db, "sales"), orderByChild("date"), equalTo(todayStr));
            onValue(salesQuery, (snapshot) => {
                let dailyTotal = 0;
                snapshot.forEach((child) => { dailyTotal += child.val().total; });
                totalSalesEl.innerText = dailyTotal;
            });

        } catch (error) {
            document.getElementById('connectionStatus').innerText = "❌ فشل الاتصال بقاعدة البيانات";
        }
    </script>
</body>
</html>
